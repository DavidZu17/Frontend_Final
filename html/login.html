    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alaz - Inicio de Sesión</title>
    <link rel="stylesheet" href="../css/styleslogin.css">
   
</head>
<body>

    <div class="login-card">
        <div class="Titulo">
            <h1>AlaZ</h1>
        </div>
        
        <form>
            <div class="grupoform">
                <label for="user">Usuario o Correo:</label>
                <input type="text" id="user" name="user" required>
            </div>
            
            <div class="grupoform">
                <label for="pass">Contraseña:</label>
                <input type="password" id="pass" name="pass" required>
            </div>
            
            <button type="submit">INGRESAR</button>
        </form>

        <div class="restablecer">
            <a href="restablecerContraseña.html">Olvidé mi contraseña</a>
        </div>
    </div>

</body>
</html>
