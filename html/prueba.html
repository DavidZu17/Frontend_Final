<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/prueba.css">
    <title>Document</title>
</head>
<body>
  <div class="search-container">
  <details open> <summary>
      <h1>Busca tu próximo destino</h1>
      </summary>

    <div class="search-box">
      <div class="contenedor-input-vuelo">
        <label class="etiqueta-input">Origen</label>
        <input type="text" id="origen" class="entrada-vuelo" placeholder="¿De dónde sales?" />
        <div class="icono-intercambio">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#002344" stroke-width="2">
            <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16" />
          </svg>
        </div>
      </div>

      <div class="contenedor-input-vuelo-destino">
        <label class="etiqueta-input">Destino</label>
        <input type="text" id="destino" class="entrada-vuelo" placeholder="¿A dónde vas?" />
      </div>

      <div class="contenedor-input-vuelo-destino datosfechaSalida">
        <label class="etiqueta-input">Salida</label>
        <input type="date" id="fecha-salida" class="entrada-vuelo" />
      </div>

      <div class="contenedor-input-vuelo-destino datosfechaRegreso">
        <label class="etiqueta-input">Regreso</label>
        <input type="date" id="fecha-regreso" class="entrada-vuelo" />
      </div>

      <div class="contenedor-input-vuelo-destino viajeros">
        <label class="etiqueta-input"><i class="fa-solid fa-users"></i> Viajeros</label>
        <input type="number" id="cantidad-viajeros" class="entrada-vuelo" min="1" max="100" value="1" />
      </div>

      <button class="btn-search">Buscar Vuelos</button>
    </div>
  </details>
</div>
</div>
</body>
</html>
