<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Vuelos y Carrusel</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

        /* --- ESTILO DEL BUSCADOR (Lo que hicimos antes) --- */
        .caja-busqueda {
            display: flex;
            align-items: center;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 50px;
        }

        .contenedor-input-vuelo {
            position: relative;
            background-color: white;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            padding: 10px 15px;
            width: 200px;
        }

        .etiqueta-input {
            display: block;
            color: #666;
            font-size: 12px;
            font-weight: bold;
        }

        .entrada-vuelo {
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
        }

        .icono-intercambio {
            position: absolute;
            right: -18px;
            top: 50%;
            transform: translateY(-50%);
            background: white;
            border: 2px solid #002344;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            cursor: pointer;
            color: #002344;
        }

        /* --- ESTILO DEL CARRUSEL --- */
        .ventana-carrusel {
            position: relative;
            width: 600px;
            height: 350px;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .contenedor-tarjetas {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tarjeta-vuelo {
            min-width: 100%;
            height: 100%;
            position: relative;
        }

        .tarjeta-vuelo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            color: white;
        }

        /* --- BOTONES DE NAVEGACIÓN --- */
        .boton-flecha {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #002344;
            border: none;
            width: 45px;
            height: 45px;
            cursor: pointer;
            font-size: 20px;
            border-radius: 50%;
            z-index: 20;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .boton-flecha:hover {
            background: #002344;
            color: white;
        }

        .izquierda { left: 15px; }
        .derecha { right: 15px; }
    </style>
</head>
<body>

    <div class="caja-busqueda">
        <div class="contenedor-input-vuelo">
            <label class="etiqueta-input">Desde</label>
            <input type="text" class="entrada-vuelo" value="Cali (CLO)">
            <div class="icono-intercambio">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M7 16V4M7 4L3 8M7 4L11 8M17 8V20M17 20L21 16M17 20L13 16" />
                </svg>
            </div>
        </div>
        <div class="contenedor-input-vuelo" style="margin-left: 10px; border-radius: 0 12px 12px 0;">
            <label class="etiqueta-input">Hacia</label>
            <input type="text" class="entrada-vuelo" placeholder="Destino">
        </div>
    </div>

    <div class="ventana-carrusel" id="carruselRaiz">
        <div class="contenedor-tarjetas" id="pistaCarrusel">
            <div class="tarjeta-vuelo">
                <img src="https://images.unsplash.com/photo-1512813195386-6cf811ad3542?q=80&w=800"  alt="Cali">
                <div class="info-overlay">
                    <h2>Cali, Colombia</h2>
                    <p>La capital de la salsa te espera.</p>
                </div>
            </div>
            <div class="tarjeta-vuelo">
                <img src="https://images.unsplash.com/photo-1512813195386-6cf811ad3542?q=80&w=800" alt="Medellín">
                <div class="info-overlay">
                    <h2>Medellín</h2>
                    <p>Disfruta de la ciudad de la eterna primavera.</p>
                </div>
            </div>
            <div class="tarjeta-vuelo">
                <img src="https://images.unsplash.com/photo-1589909202802-8f4aadce1849?q=80&w=800" alt="Cartagena">
                <div class="info-overlay">
                    <h2>Cartagena</h2>
                    <p>Historia y mar en un solo lugar.</p>
                </div>
            </div>
        </div>

        <button class="boton-flecha izquierda" onclick="atras()">&#10094;</button>
        <button class="boton-flecha derecha" onclick="siguiente()">&#10095;</button>
    </div>

    <script>
        const pista = document.getElementById('pistaCarrusel');
        const tarjetas = document.querySelectorAll('.tarjeta-vuelo');
        const carruselRaiz = document.getElementById('carruselRaiz');
        let contador = 0;
        let intervaloAuto;

        function mostrarImagen() {
            pista.style.transform = `translateX(-${contador * 100}%)`;
        }

        function siguiente() {
            contador++;
            if (contador >= tarjetas.length) {
                contador = 0;
            }
            mostrarImagen();
        }

        function atras() {
            contador--;
            if (contador < 0) {
                contador = tarjetas.length - 1;
            }
            mostrarImagen();
        }

        // Iniciar movimiento automático
        function iniciarAuto() {
            intervaloAuto = setInterval(siguiente, 4000);
        }

        // Detener movimiento automático
        function detenerAuto() {
            clearInterval(intervaloAuto);
        }

        // Eventos
        iniciarAuto();
        carruselRaiz.addEventListener('mouseenter', detenerAuto);
        carruselRaiz.addEventListener('mouseleave', iniciarAuto);
    </script>
</body>
</html>
